<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cluster Scope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <div class="grid-overlay"></div>

    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">◆</span>
          <span class="brand-text">Cluster<span class="brand-accent">Scope</span></span>
          <span class="brand-sub">bin-packing playground</span>
        </div>
        <div class="topbar-tag">scheduler · bin-packing (FFD + K8s scoring)</div>
      </header>

      <section class="kpi-strip" id="kpi-strip"></section>

      <div class="workspace">
        <aside class="rail">
          <section class="card pool-card">
            <header class="card-head">
              <div>
                <span class="kicker">Capacity</span>
                <h2>Pools</h2>
              </div>
              <button class="ghost danger" id="reset-cluster-btn" type="button">Reset</button>
            </header>
            <div class="pool-list" id="pool-catalog"></div>
          </section>

          <section class="card deploy-card">
            <header class="card-head">
              <div>
                <span class="kicker">Workload</span>
                <h2>Deploy pod</h2>
              </div>
            </header>
            <form class="deploy-form" id="deploy-form">
              <label class="field">
                <span>Service / image</span>
                <select id="pod-service-select"></select>
              </label>
              <div class="field-pair">
                <label class="field">
                  <span>CPU</span>
                  <input id="pod-cpu-input" type="number" min="0.1" step="0.1" value="4.0">
                </label>
                <label class="field">
                  <span>Memory (GiB)</span>
                  <input id="pod-memory-input" type="number" min="0.1" step="0.1" value="8.0">
                </label>
              </div>
              <div class="deploy-actions">
                <button class="btn primary" id="deploy-pod-btn" type="submit">Deploy</button>
                <button class="ghost" id="clear-pods-btn" type="button">Clear queue</button>
              </div>
            </form>
          </section>
        </aside>

        <section class="canvas">
          <header class="canvas-head">
            <div>
              <span class="kicker">Topology</span>
              <h2>Cluster</h2>
            </div>
            <span class="canvas-hint" id="canvas-hint">add nodes to start</span>
          </header>
          <div class="nodes-grid" id="nodes-grid"></div>
        </section>
      </div>

      <section class="card capacity-card" id="capacity-card" hidden>
        <header class="card-head">
          <div>
            <span class="kicker">Capacity planning</span>
            <h2>Bin-packing vs MILP</h2>
          </div>
          <span class="queue-hint" id="capacity-hint"></span>
        </header>
        <div class="capacity-grid" id="capacity-grid"></div>
      </section>

      <section class="card queue-card">
        <header class="card-head">
          <div>
            <span class="kicker">Queue</span>
            <h2>Pod scheduling</h2>
          </div>
          <span class="queue-hint" id="queue-hint"></span>
        </header>
        <div class="deployment-list" id="deployment-list"></div>
      </section>
    </main>
  </body>
</html>
